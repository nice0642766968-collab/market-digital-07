<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Digital Market | ตลาดซื้อขายออนไลน์</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authView" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <h2>🌙 CRU <span>Market</span></h2>
                <p id="authSubtitle">เข้าสู่ระบบเพื่อเข้าสู่ตลาดนักศึกษา</p>
            </div>
            <div class="auth-body">
                <input type="email" id="email" placeholder="อีเมลนักศึกษา (@chandra.ac.th)">
                <input type="password" id="password" placeholder="รหัสผ่าน">
                <button onclick="handleAuth()" id="btnAuth" class="btn-primary">ตกลง</button>
                <div class="auth-footer">
                    <span id="toggleText">ยังไม่มีบัญชี?</span> 
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="btnToggle">สมัครสมาชิก</a>
                </div>
            </div>
        </div>
    </div>

    <div id="appView" class="app-wrapper" style="display: none;">
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo">CRU <span>Digital Market</span></div>
                <div class="nav-right">
                    <button class="btn-post" onclick="openModal('postModal')">+ ลงประกาศขาย</button>
                    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <div class="main-layout">
            <aside class="sidebar">
                <h3>คณะ / หมวดหมู่</h3>
                <ul id="catMenu">
                    <li class="active" onclick="filterCat('ทั้งหมด')">ทั้งหมด</li>
                    <li onclick="filterCat('วิทยาศาสตร์')">คณะวิทยาศาสตร์</li>
                    <li onclick="filterCat('วิทยาการจัดการ')">คณะวิทยาการจัดการ</li>
                    <li onclick="filterCat('มนุษยศาสตร์')">คณะมนุษยศาสตร์ฯ</li>
                    <li onclick="filterCat('ศึกษาศาสตร์')">คณะศึกษาศาสตร์</li>
                </ul>
            </aside>

            <main class="feed">
                <div id="productGrid" class="grid">
                    </div>
            </main>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>📢 ลงประกาศขายสินค้า</h3>
            <input type="text" id="pTitle" placeholder="ชื่อสินค้า">
            <select id="pCat">
                <option value="ทั่วไป">เลือกคณะ/หมวดหมู่</option>
                <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
                <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
                <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
            </select>
            <input type="number" id="pPrice" placeholder="ราคา (บาท)">
            <textarea id="pDesc" placeholder="รายละเอียดสินค้าและจุดนัดรับ..."></textarea>
            
            <div class="modal-footer">
                <button onclick="closeModal('postModal')" class="btn-secondary">ยกเลิก</button>
                <button onclick="savePost()" class="btn-primary">ยืนยันโพสต์</button>
            </div>
        </div>
    </div>

    <div id="chatBox" class="chat-float" style="display: none;">
        <div class="chat-header">
            <span id="chatTitle">ห้องแชท</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div id="chatMsgs" class="chat-body"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="ถามผู้ขาย...">
            <button onclick="sendMsg()">ส่ง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
